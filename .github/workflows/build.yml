name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROIDSDK: /usr/local/lib/android/sdk

  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
  ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
  ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724

  ANDROIDAPI: "33"
  ANDROIDMINAPI: "21"

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROIDSDK=$ANDROIDSDK"

          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
          echo "ANDROIDNDK=$ANDROIDNDK"

          yes | sdkmanager --licenses

          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.2"

          echo "$ANDROID_HOME/build-tools/33.0.2" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          sudo ln -sf "$ANDROID_HOME/build-tools/33.0.2/aidl" /usr/local/bin/aidl

          echo "Checking tools..."
          java -version
          which java
          which sdkmanager
          which aidl
          aidl --version || true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            pkg-config \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            autoconf \
            automake \
            cmake \
            libssl-dev \
            libffi-dev

      - name: Install Buildozer and pinned Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "buildozer==1.5.0" "Cython==0.29.37" "setuptools<70"

      - name: Show Buildozer version
        run: |
          buildozer --version

      - name: Check required project files
        run: |
          pwd
          ls -la

          echo "Checking main.py..."
          test -f main.py

          echo "Checking buildozer.spec..."
          test -f buildozer.spec

          echo "Checking workflow files..."
          find .github/workflows -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) -print

      - name: Build APK with Buildozer
        id: build
        continue-on-error: true
        run: |
          export ANDROID_HOME="$ANDROID_HOME"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROIDSDK="$ANDROID_HOME"

          export ANDROID_NDK_HOME="$ANDROID_NDK_HOME"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          export ANDROIDNDK="$ANDROID_NDK_HOME"

          export ANDROIDAPI="33"
          export ANDROIDMINAPI="21"

          export JAVA_HOME="/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.19-10/x64"
          export PATH="$JAVA_HOME/bin:$ANDROID_HOME/build-tools/33.0.2:$ANDROID_HOME/platform-tools:$PATH"

          buildozer -v android debug 2>&1 | tee buildozer-build.log

      - name: Upload Buildozer log if failed
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-log
          path: buildozer-build.log

      - name: Fail job if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: sc-solutions-apk
          path: bin/*.apk
