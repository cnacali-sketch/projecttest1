name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  # Keep only this.
  # Do NOT set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 at the same time.
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROIDSDK: /usr/local/lib/android/sdk

  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
  ANDROID_NDK_ROOT: /usr/local/lib/android/sdk/ndk/27.3.13750724
  ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724

  ANDROIDAPI: "33"
  ANDROIDMINAPI: "21"

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Java 8 for Gradle daemon only
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components using Java 17
        run: |
          set -e

          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          sudo ln -sfn "$ANDROID_HOME/cmdline-tools/16.0" "$ANDROID_HOME/cmdline-tools/latest"

          echo "Using Java for Android SDK tools:"
          java -version

          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses

          sdkmanager --sdk_root="$ANDROID_HOME" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/build-tools/33.0.2" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          sudo ln -sf "$ANDROID_HOME/build-tools/33.0.2/aidl" /usr/local/bin/aidl

          echo "Checking tools:"
          which java
          which sdkmanager
          which avdmanager
          which aidl

          java -version
          aidl --version || true

      - name: Install Gradle 7.6.4
        run: |
          cd /tmp

          if [ ! -d /tmp/gradle-7.6.4 ]; then
            curl -fsSL -o gradle-7.6.4-bin.zip https://services.gradle.org/distributions/gradle-7.6.4-bin.zip
            unzip -q gradle-7.6.4-bin.zip
          fi

          echo "/tmp/gradle-7.6.4/bin" >> "$GITHUB_PATH"

          /tmp/gradle-7.6.4/bin/gradle -v | head -20

      - name: Configure Gradle to use Java 8 daemon
        run: |
          mkdir -p "$HOME/.gradle"

          cat > "$HOME/.gradle/gradle.properties" <<EOF
org.gradle.java.home=$JAVA_HOME_8_X64
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
EOF

          echo "Gradle daemon Java:"
          cat "$HOME/.gradle/gradle.properties"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            pkg-config \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libwebp-dev \
            libfreetype6-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libosmesa6-dev \
            autoconf \
            automake \
            cmake \
            libssl-dev \
            libffi-dev

      - name: Install Buildozer and pinned Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "buildozer==1.5.0" "Cython==0.29.37" "setuptools<70"

      - name: Show versions
        run: |
          echo "Python:"
          python --version

          echo "Java 17:"
          "$JAVA_HOME_17_X64/bin/java" -version

          echo "Java 8:"
          "$JAVA_HOME_8_X64/bin/java" -version

          echo "Gradle:"
          gradle -v | head -20

          echo "Buildozer:"
          buildozer --version

      - name: Check required project files
        run: |
          pwd
          ls -la

          echo "Checking main.py..."
          test -f main.py

          echo "Checking buildozer.spec..."
          test -f buildozer.spec

          echo "Checking invoice_templates.py..."
          test -f invoice_templates.py

          echo "Checking workflow files..."
          find .github/workflows -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) -print

      - name: Build APK with Buildozer
        id: build
        continue-on-error: true
        run: |
          set -o pipefail

          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:/tmp/gradle-7.6.4/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/build-tools/33.0.2:$ANDROID_HOME/platform-tools:$PATH"

          export ANDROID_HOME="$ANDROID_HOME"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export ANDROIDSDK="$ANDROID_HOME"

          export ANDROID_NDK_HOME="$ANDROID_NDK_HOME"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          export ANDROIDNDK="$ANDROID_NDK_HOME"

          export ANDROIDAPI="33"
          export ANDROIDMINAPI="21"

          export GRADLE_USER_HOME="$HOME/.gradle"
          export GRADLE_OPTS="-Dorg.gradle.java.home=$JAVA_HOME_8_X64 -Xmx4096m -Dfile.encoding=UTF-8"

          echo "Buildozer Java version:"
          java -version

          echo "Gradle version:"
          which gradle
          gradle -v | head -20

          echo "Gradle daemon property:"
          cat "$HOME/.gradle/gradle.properties"

          /tmp/gradle-7.6.4/bin/gradle --stop || true

          buildozer -v android debug 2>&1 | tee buildozer-build.log

      - name: Print Buildozer errors
        if: steps.build.outcome == 'failure'
        run: |
          if [ -f buildozer-build.log ]; then
            echo "===== BUILD ERRORS ====="
            grep -inE "\[ERROR\]|Traceback|Build failed|Command failed|Exception|ModuleNotFoundError|No such file|missing|failed" buildozer-build.log | tail -n 300 || true

            echo ""
            echo "===== LAST 300 LINES ====="
            tail -n 300 buildozer-build.log
          else
            echo "buildozer-build.log was not created."
          fi

      - name: Upload Buildozer log if failed
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-log
          path: buildozer-build.log

      - name: Fail job if Buildozer failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Find APK
        run: |
          set -e

          echo "Looking for APK files..."
          find . -maxdepth 4 -type f -name "*.apk" -print -exec ls -lh {} \; || true

          mkdir -p bin

          shopt -s nullglob
          apks=(bin/*.apk)

          if [ "${#apks[@]}" -eq 0 ]; then
            echo "ERROR: No APK found in bin/"
            exit 1
          fi

          echo "APK files found:"
          for apk in "${apks[@]}"; do
            ls -lh "$apk"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sc-solutions-apk
          path: bin/*.apk
          if-no-files-found: error
